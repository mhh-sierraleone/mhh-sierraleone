<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MHH Sierra Leone</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f8fb;
      color: #123;
    }
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, #0b5cab, #1da36f);
      color: white;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.2rem;
      max-width: 700px;
      line-height: 1.6;
    }
    .btn {
      margin-top: 20px;
      padding: 12px 22px;
      border: none;
      border-radius: 8px;
      background: white;
      color: #0b5cab;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
    }
  </style>
</head>
<body>
  <section class="hero">
    <h1>Medical Health Hub Sierra Leone</h1>
    <p>REAL PEOPLE. REAL IMPACT. REAL GROWTH.</p>
    <p>Building healthier communities through health education, outreach, and service.</p>
    <a class="btn" href="#">Join Us</a>
  </section>
</body>
</html>
